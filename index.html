1px solid ${c}33`}}>
                  <div style={{fontSize:20,fontWeight:900,color:c}}>{v}</div>
                  <div style={{fontSize:11,color:C.t2,marginTop:2}}>{l}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{fontSize:14,fontWeight:700,color:C.t2,marginBottom:12}}>あなたの依頼</div>
          {posts.filter(p=>p.userId===me.id).length===0&&<div style={{textAlign:"center",color:C.t3,padding:"30px 20px",fontSize:14}}>まだ投稿がありません</div>}
          {posts.filter(p=>p.userId===me.id).map(p=>(
            <div key={p.id} style={{background:C.s2,borderRadius:14,padding:"12px 14px",marginBottom:10,border:`1px solid ${C.b2}`}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,alignItems:"center"}}>
                <TimingBadge timing={p.timing}/>
                <StatusBadge status={p.status}/>
              </div>
              <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>{p.from} → {p.to}</div>
              <div style={{display:"flex",gap:12,fontSize:13,color:C.t2}}>
                <span style={{color:C.accent,fontWeight:700}}>{fmtYen(p.price)}</span>
                <span>💬{p.replies.length}</span><span>❤️{p.likes}</span>
                <span style={{marginLeft:"auto"}}>{ago(p.time)}</span>
              </div>
              {p.status==="受付終了"&&<button onClick={()=>setChat(p)} style={{width:"100%",marginTop:10,padding:"10px 0",background:C.bL,color:C.blue,border:`1px solid ${C.blue}44`,borderRadius:12,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>💬 チャットを開く</button>}
            </div>
          ))}
        </div>}

      </div>

      {/* BOTTOM NAV */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(0,0,0,0.96)",borderTop:`1px solid ${C.border}`,display:"flex",backdropFilter:"blur(12px)",zIndex:100}}>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>setScreen(n.id)}
            style={{flex:1,padding:"10px 0 14px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,fontFamily:"inherit",color:screen===n.id?C.accent:C.t3,transition:"all .15s"}}>
            <span style={{fontSize:19,lineHeight:1}}>{n.icon}</span>
            <span style={{fontSize:9,fontWeight:screen===n.id?700:400}}>{n.label}</span>
            {screen===n.id&&<div style={{width:4,height:4,borderRadius:"50%",background:C.accent}}/>}
          </button>
        ))}
      </div>

    </div>
  );
}
